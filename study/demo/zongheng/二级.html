                        firstChapterContent: "\u003Cp\u003E如今的大宇宙，属于一个天空文明高度发达的时代，天空科技力量达到了登峰造极的程度。\u003C\u002Fp\u003E\u003Cp\u003E东方宇宙中的一个位面世界中，这里随处可见由虚空战舰改造而成的空中城镇，浮空石铸成的天空之城，以及依靠空间阵法力量打造出的虚空岛屿和天空国度.......\u003C\u002Fp\u003E\u003Cp\u003E人类做为宇宙中数量最为宠大的一个群体，他们最喜欢居住在地上，但也有着相当多的数量，会选择以天空为家，足见天空文明的发达程度了。\u003C\u002Fp\u003E\u003Cp\u003E大宇宙划分为五方域宇宙简称“五方宇宙”，其中“人”是泛指一切的拥有着高级智慧的生灵，而并不是单单的特指人类一个物种！\u003C\u002Fp\u003E\u003Cp\u003E天空、海洋、森林、陆地、火海等，到处出现着各种类型的灵兽，它们的强大，远远超出了普通野兽，让普通人看到后，会感觉恐惧和忌惮。\u003C\u002Fp\u003E\u003Cp\u003E几名fo军大兵站在一艘庞大的空中军舰上，正在瞭望着远方的风景，相互间畅快的交谈着，彼此间的脸庞上扬溢着惬意的笑容。\u003C\u002Fp\u003E\u003Cp\u003E这些fo兵，穿着统一的军式制服，铠甲样式，背后系着红色的披风之上，滚荡飘扬着“普度苍生”四个黄金发亮的大字。\u003C\u002Fp\u003E\u003Cp\u003E一卷狂暴飓风，从军舰旁的虚空中袭掠而来，虽然风力猛劲裂空，却丝豪未能让这几位大兵，提起半点的惧惊之心。\u003C\u002Fp\u003E\u003Cp\u003E这艘军舰有着强大的防御力，运用了宇宙当前最新科技技术制造，并采用宇宙人工合成的新材料打造而成，能够轻松抵抗，比这风力更加强大的破坏和侵袭。\u003C\u002Fp\u003E\u003Cp\u003E不过这种极具攻击性的天空飓风，莫说对民用飞船了，就是普通的破坏者战型飞船，也很难抵御得住其风力的破坏！\u003C\u002Fp\u003E\u003Cp\u003E在这艘巨无霸军舰下方，是片起伏连绵如同绿山般的郁葱大森林。\u003C\u002Fp\u003E\u003Cp\u003E此时，一条蜿蜒似蛇连贯在整座山林中的林中山路之上，正行走着六名膀大腰圆的强壮大汉。\u003C\u002Fp\u003E\u003Cp\u003E大汉们配合着抬着一口一米见方的古怪箱子，箱子外观看不出使用的是木质还是金属所铸，木箱的外层，刷着一层明亮的伪装漆！\u003C\u002Fp\u003E\u003Cp\u003E六个强壮的大汉，共同抬着这口箱子，竟然显的颇为吃力，急促的声音，从他们的嘴里喘息喊出：\u003C\u002Fp\u003E\u003Cp\u003E“一二，一二.....”\u003C\u002Fp\u003E\u003Cp\u003E从他们喊出口号的不稳之声，便足以看出这箱子异常的沉重！\u003C\u002Fp\u003E\u003Cp\u003E军舰之上一个金色长发的fo军上士，手持魂力空对地望远镜，看着林中清楚可见的一幕，不禁大声笑道：\u003C\u002Fp\u003E\u003Cp\u003E“兄弟们快来看，那几个呆汉，抬的是什么玩意，有那么沉重嘛，竟把他们累成了这幅德性？”\u003C\u002Fp\u003E\u003Cp\u003E大兵口气中流露出一抹不屑与莫不关心，他们是fo军战士，莫说某个位面世界，就算放眼整个东方宇宙，甚至大宇宙中，也是很有地位的存在。\u003C\u002Fp\u003E\u003Cp\u003E因为fo军有着纵横宇宙的执法权，维护大宇宙秩序和平，打击邪恶势力，就是他们的职责，同样也是一种至高的权力。\u003C\u002Fp\u003E\u003Cp\u003Efo军是破坏者的“克星”，在常人眼里的地位，自然就非同寻常了。\u003C\u002Fp\u003E\u003Cp\u003E“我看是毛贼窃取了什么东西，与我们不相干，我们只关心破坏者，那才是我们的菜，哈哈.....”\u003C\u002Fp\u003E\u003Cp\u003E一名头发灰黄的fo军大兵，哈哈笑着说道，站在一旁的大兵们，也都附和着插科打浑的嘻笑起来。\u003C\u002Fp\u003E\u003Cp\u003E先前开口讲话那位上士，不禁摇了摇头。\u003C\u002Fp\u003E\u003Cp\u003E他从望远镜的视野中看的很清楚，穿林而过的那几个大汉，各个赤着臂膀，衣冠不整，从这些人的外观服饰看去，也只不过是普通的家丁罢了，怎么也不能是那种，让各世界和宇宙fo军都要慎重对待的破坏者。\u003C\u002Fp\u003E\u003Cp\u003E一艘体型庞大民用飞船，缓缓飘移在绿色森林上空，距离地面只有不到一公里。\u003C\u002Fp\u003E\u003Cp\u003E奇怪的是，飞船不是在朝着某个固定方向持续前行，而是来回保持着固有的路线，进行着来回循环式的飞行。\u003C\u002Fp\u003E\u003Cp\u003E体积庞大的空中飞船，和那艘军用飞船相比，体量相比不知要大了多少倍，这可不是普通的民用型飞船，载客量可达数万人，因此也不是作战型飞船，而是可以乘载人数众多的空天船舰。\u003C\u002Fp\u003E\u003Cp\u003E而这船舰，非战斗类型，属于运输类型。\u003C\u002Fp\u003E\u003Cp\u003E克斯玛镇上，此刻热闹非凡，车水马龙。严整宽阔的街道之上，到处张贴着红底金字极为醒目的祝贺标语，镇民们洋溢在一股喜庆的氛围之中，如盛大节日来临般的热闹非凡。\u003C\u002Fp\u003E\u003Cp\u003E镇长家的公子哥，在魂力学院学习成功荣升到了高级班，得到了这个巨大喜报之后，所以镇长胡斯，不惜花费重金大摆庆功宴，宴请同僚和朋友，甚至全镇居民，前来同喜同乐。\u003C\u002Fp\u003E\u003Cp\u003E魂力修行者又简称魂力者，分别划分为武修、剑修、阵法修、魔法修、体技修，幻术修等等。\u003C\u002Fp\u003E\u003Cp\u003E不过主要的修炼职业，只有两大类分别是“武道”和“战兵道”，其它的修炼则归属于副修，无论哪种类型的修炼，都离不开以魂力修行基础作支撑。\u003C\u002Fp\u003E\u003Cp\u003E打个恰当的比方说，修行魂力，就好比普通人上课学习似的，学科定好之后，学习水平的高低将，决定着一个人的未来前途。\u003C\u002Fp\u003E\u003Cp\u003E能够成为魂力者，本来就是普通人梦寐以求的，更加重要的是，魂力者有着一定机率可以成为更加强大的灵魂怪物，这才是每个魂力者的最大愿望和追求的目标。\u003C\u002Fp\u003E\u003Cp\u003E胡塞尔，贵为镇长之子，今年才十九岁，就已经成为了一名魂力学院的高级班学生，对于普通魂力学子来说，这是极难实现的目标了，未来的前途必然不可限量，怎么不令人感到骄傲和自豪呢。\u003C\u002Fp\u003E\u003Cp\u003E要知道一个普通村镇里，能够成功苏醒魂力的机率才不到十分之一，然后还要经历极为苛刻的魂力测试，合格后，才能进入灵魂学院。\u003C\u002Fp\u003E\u003Cp\u003E魂力修行的学业，更是极具艰难，不光努力就行，最重要是看天赋和潜力，魂力境界上每个小小等级的晋升，都是难上加难的事！\u003C\u002Fp\u003E\u003Cp\u003E今日到克斯玛镇前来祝贺的，不但有和胡斯镇长关系要好的一些官员、富贾名流，更有一些往日不大对付的政敌等，只要和他相识的人，都借此时机，化敌为友的蜂涌而来了。\u003C\u002Fp\u003E\u003Cp\u003E又有哪个蠢人，愿意提前开罪一个，日后有着极大机会成为魂力者的势力呢？\u003C\u002Fp\u003E\u003Cp\u003E魂力者就是放眼在强大的fo军中，都是重点培养的对象，只要任其顺利发展成长下去，随便都不是一个区区镇长能够相比的呀。\u003C\u002Fp\u003E\u003Cp\u003E虽说，魂修学生从魂力学院毕业后，距离成为真正的魂力强者，尚有着一定距离，不过看得到的成功机率是极有希望的，这就足够了，未来的发展机遇，谁又能说的准呢。\u003C\u002Fp\u003E\u003Cp\u003E在镇长阔绰的豪宅内，巨大而开阔的大厅当中，此刻站满着绘声绘色相互交谈的人群。\u003C\u002Fp\u003E\u003Cp\u003E他们身着缤纷鲜艳的礼服，彰显出异于普通人的高贵身份，都属于各个领域的精英人物。\u003C\u002Fp\u003E\u003Cp\u003E“看那里，好可怕暴风，正朝着我们这边来了.....”一个长相肥胖的中年男人，突然手指着窗外黑色涌动的风云，瞪着如绿豆般大小的眼睛，吃惊的说道。\u003C\u002Fp\u003E\u003Cp\u003E这肥胖男子的对面，端坐着一位精瘦高个子男子，却使用不屑的口气，说道：\u003C\u002Fp\u003E\u003Cp\u003E“胖子，你胆子就是太小了。我们的飞船镇固如金汤，这种层次的风力，根本无须担心。”\u003C\u002Fp\u003E\u003Cp\u003E一个短式蓝发的帅气男生，走到远处一姿色风韵身穿着红袍长裙，包裹的身材显的凸凹有致的女人面前，极有绅士的微躬一礼，道：“美丽的小姐，我能请您喝一杯吗？”\u003C\u002Fp\u003E\u003Cp\u003E中年女子微微抬起光洁下巴，手中轻摇着高脚杯，红色剔透的液体中，摇拽着她那开启的朱红唇影，\u003C\u002Fp\u003E\u003Cp\u003E“对不起小哥，我对不太成熟的男人没有兴趣，哈哈。”\u003C\u002Fp\u003E\u003Cp\u003E说完这句话，她眼眸中充满着戏谑之色的看了一眼，这位上前向她搭讪的短发少年，不在理会，转眼深情款款的望向与她对坐在那的中年男人而去。\u003C\u002Fp\u003E\u003Cp\u003E男人和女子视线对望了一下，不由一起哈哈大笑起来，视那像泄了气蛤蟆似的少年于无物的，端起酒杯继续畅饮了起来。\u003C\u002Fp\u003E\u003Cp\u003E而这位蓝发少年，却是胡塞尔的同班同学。\u003C\u002Fp\u003E\u003Cp\u003E森林尽头处，一缕刺眼阳光照进了大汉的双眸当中，他们汗流挟背的将这口沉重的箱子，终于给抬了出来。\u003C\u002Fp\u003E\u003Cp\u003E长着络腮胡须的大汉，向同伴抱怨道：“李镇长难道让我们送的是一箱金子不成，竟然如此沉重？前方不远就该到地方了，我们也停下来歇息一下吧？”\u003C\u002Fp\u003E\u003Cp\u003E“嗯，既然就要到克斯玛镇了，我们就先停下来歇息一下吧。”一名红衣大汉，招手说道。\u003C\u002Fp\u003E\u003Cp\u003E红衣大汉是这群人的领头，指挥着把箱子平稳放下来之后，这才从腰间抽出一杆旱烟袋，安装上烟丝，在手上轻轻的磕碰了一下，说道：\u003C\u002Fp\u003E\u003Cp\u003E“不要多问，这是我们镇长特意送给胡斯镇长的重礼，今天是胡镇长家的公子，荣升魂力学院高级班的大好日子，礼物肯定轻不了。”\u003C\u002Fp\u003E\u003Cp\u003E“要是我能有这么一个有出息的儿子，我就烧高香了，”一个大汉，坐在手臂粗细树根上饮了一口劣质的白酒，发红的眼睛里充满着羡慕的，说道。\u003C\u002Fp\u003E\u003Cp\u003E“能进入魂力学院的，哪个也不是普通的人啊，一旦进入高级班，那就意味着百分之百可以结业了，以后有很大的机会成为一名魂力者。我们普通人要是能有这么出息的儿子，这辈子可就发达了.....”\u003C\u002Fp\u003E\u003Cp\u003E喝酒大汉身边的绿脸大汉，口气艳羡的接茬说。\u003C\u002Fp\u003E\u003Cp\u003E正在几名大汉闲聊之际，一团来历不明的金属液体，诡异的宛如团影子一样，无声无息的移动到了箱子旁。\u003C\u002Fp\u003E\u003Cp\u003E宛如偷食的耗子，液体团微微晃动着，在几名大汉豪不留意下，一下子就钻进了有条不大的缝隙中，由此进入到了箱子的内部。\u003C\u002Fp\u003E\u003Cp\u003E一只个头很大的金羽鸭，匍匐在树冠的枝桠上，虚咪着鸭睛，垂视着树下正唠嗑的几个大汉，怎么看它都像是在流露着一种坏笑的表情!\u003C\u002Fp\u003E\u003Cp\u003E果然，噗嗤一声，一泡尿被它猛然屙下！\u003C\u002Fp\u003E\u003Cp\u003E“是什么东西淋了我一脸，下雨了？....”\u003C\u002Fp\u003E\u003Cp\u003E一个大汉抹了一把湿渍的脸，有股骚臭味立即扑鼻而入，登时让他脸色铁青，抬头望去，大声叫骂起来，“该死的鸭子，你别跑....”\u003C\u002Fp\u003E\u003Cp\u003E鸭子拍着翅膀便飞离了树冠，让那捡起石头要砸它的大汉，气的暴跳如雷。\u003C\u002Fp\u003E\u003Cp\u003E大汉们没有看到，那只体型像豺狼似的巨大鸭子，不但能飞行，还生长着一对锋利如同尖刀般的锋锐爪子，在阳光的渲染下，银芒霍霍。\u003C\u002Fp\u003E\u003Cp\u003E“兄弟们，有没有感觉这口箱子，似乎越来越沉了？”抬到已经看见了前方城镇轮廓的身影时，有名大汉终于感到了一丝古怪，立即说道。\u003C\u002Fp\u003E\u003Cp\u003E“这并不奇怪。常言说的好，一鼓作气，再而衰，三而歇，我们因为刚才休息了，才会有这种感觉，快点别在消磨时间了，前面就到镇长大人的府上了。”红衣大汉鼓舞士气大声的催促，道。\u003C\u002Fp\u003E\u003Cp\u003E几名fo军大兵伸了个懒腰，正欲回到兵舱，当他们转过身子的时候，赫然看到一个惊悚的事物，身体立即僵在了那里，随之他们身上的寒毛诈立........\u003C\u002Fp\u003E\u003Cp\u003E一艘相比他们的兵船，还略小一级的巨大黑色飞船，缓缓的破云而出，顿时便出现在了大兵们的视野之中。\u003C\u002Fp\u003E\u003Cp\u003E那飞船上竖立着一杆白色的战旗，旗面上绘制着图案：手持青龙月偃刀的胖骷髅人，一刀剁碎了一颗星辰！\u003C\u002Fp\u003E\u003Cp\u003E大兵们狠狠咽了一口唾沫，豆粒大的汗水溢满了脑门子上。\u003C\u002Fp\u003E\u003Cp\u003E出现在他们面前是艘战斗型飞船，根据体积计算，足可以装纳百人之上。\u003C\u002Fp\u003E\u003Cp\u003E引起他们惊愕的是，正是屹立在飞船上的那杆战旗的图案，它代表着杀戮和破坏！\u003C\u002Fp\u003E\u003Cp\u003E旗帜上战兵骷髅破坏星辰的图案，正是象征着破坏职业的破坏者旗帜，说明那飞船上的人的身份，一定就是破坏者了！\u003C\u002Fp\u003E\u003Cp\u003E“那是破坏旗，有破坏者飞船来袭....”几个大兵边大声呼喊，有人及时按响了军舰上的警报装置，顿时震疼耳膜的巨大嗡鸣声，在这片高空中响起。\u003C\u002Fp\u003E\u003Cp\u003E破坏者飞船终于露出了那完整震撼人神经的舰身，宽十余丈，长达二十多丈，通体如梭刀形状，在舰体表面，彩绘制着一柄巨大青龙偃牙刀的涂鸦图案。\u003C\u002Fp\u003E\u003Cp\u003E飞船的外表整个一体式的钢体构架，只露出一排瞭望窗口，十二部口径三米的巨大魂力火炮，从船体两侧缓缓伸缩探出，纷纷朝左移动了三十个角度，瞄准fo军飞船，率先发起了怒火狂涛般的攻击......\u003C\u002Fp\u003E\u003Cp\u003E三颗魂力炮弹命中了目标，顿时fo军飞船在空中轰然一震后直线下沉，尾部升起了一缕巨大的黑烟，直冲下天空。\u003C\u002Fp\u003E\u003Cp\u003E这艘军用飞船，是这片空域驻守的fo军战船，负责此方领空的安全，而他们的空中母港“安卫军港”，就在距离克斯玛镇不到十公里处的空域里。\u003C\u002Fp\u003E\u003Cp\u003E“.....报告镇长，有破坏者飞船来袭，他们率先击毁了安卫军港的旗舰，现在朝着我们这边来了....”\u003C\u002Fp\u003E\u003Cp\u003E一名狼狈的镇兵，疯狂奔进了大厅之中，颤抖着大声疾呼，他的话声未落，巨大的轰鸣响声，就包围了整个镇子！\u003C\u002Fp\u003E\u003Cp\u003E炮弹轰击在克斯玛镇上，巨大的爆炸力量，令整座城镇摇摇巨晃！\u003C\u002Fp\u003E\u003Cp\u003E胡斯镇长，摇晃着吃成了滚筒状的身体，面色惊煞的大声叫道，“快去安卫军港，通知玛尔上校，让他快派fo兵前来救援.....”\u003C\u002Fp\u003E\u003Cp\u003E此时那名蓝发少年，在慌乱人群中，却能保持着一幅气定神闲的神色，与他的年纪，并不相符。\u003C\u002Fp\u003E\u003Cp\u003E少年身手敏捷，嗖的一下窜跳到了五米开外，此时从空中落下一道娇影，被他紧急接住抱在了怀中，被他抱着的女人，正是先前嘲讽过他的那个成熟美女。\u003C\u002Fp\u003E\u003Cp\u003E“谢谢你....”女人面色苍白的答谢道。\u003C\u002Fp\u003E\u003Cp\u003E“女士你，现在明白了吧，男人能力的大小，是不可以看年龄的。”\u003C\u002Fp\u003E\u003Cp\u003E蓝发少年把女人放回地面，安顿好后，转身离开，他说话的声音响了起来，嘴角上抿起一抹古怪的笑容。\u003C\u002Fp\u003E\u003Cp\u003E看着那离开的背影，成熟女人面色微有尴尬的点了点头，光洁的额头上，已然香汗淋漓。(ps:这版是原书，内容没有修改，主要指错别字标点符号没有修正)\u003C\u002Fp\u003E",
